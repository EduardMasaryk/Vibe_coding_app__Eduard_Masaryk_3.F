<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulačka Jednotiek a Veličín</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔄 Kalkulačka Jednotiek a Veličín</h1>
            <p class="subtitle">Rýchly prevod jednotiek medzi kategóriami</p>
        </header>

        <!-- Tab Navigation -->
        <div class="tabs-container">
            <button class="tab-button active" data-category="temperature">🌡️ Teplota</button>
            <button class="tab-button" data-category="distance">📏 Vzdialenosť</button>
            <button class="tab-button" data-category="weight">⚖️ Hmotnosť</button>
            <button class="tab-button" data-category="speed">🚗 Rýchlosť</button>
        </div>

        <!-- Main Converter Section -->
        <div class="converter-section">
            <!-- Input Section -->
            <div class="input-group">
                <div class="form-row">
                    <div class="input-wrapper">
                        <label for="inputValue">Zadaj hodnotu:</label>
                        <input 
                            type="number" 
                            id="inputValue" 
                            placeholder="0" 
                            step="any"
                            class="value-input"
                        >
                        <span class="error-message" id="errorMessage"></span>
                    </div>

                    <div class="select-wrapper">
                        <label for="fromUnit">Zo jednotky:</label>
                        <select id="fromUnit" class="unit-select">
                            <!-- Dynamically populated -->
                        </select>
                    </div>

                    <button class="swap-button" id="swapButton" title="Prehodiť jednotky">⇄</button>

                    <div class="select-wrapper">
                        <label for="toUnit">Na jednotku:</label>
                        <select id="toUnit" class="unit-select">
                            <!-- Dynamically populated -->
                        </select>
                    </div>
                </div>

                <div class="result-display">
                    <div class="result-box">
                        <span class="result-label">Výsledok:</span>
                        <span class="result-value" id="resultValue">0</span>
                    </div>
                </div>
            </div>

            <!-- Results Table -->
            <div class="table-section">
                <h2>Všetky hodnoty</h2>
                <div class="table-wrapper">
                    <table class="results-table" id="resultsTable">
                        <thead>
                            <tr>
                                <th>Jednotka</th>
                                <th>Hodnota</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- Dynamically populated -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Info Section -->
        <div class="info-section">
            <p><strong>💡 Tip:</strong> Prevod prebieha automaticky pri zadávaní. Jednotky sa prepočítavajú v reálnom čase.</p>
        </div>
    </div>

    <script src="assets/js/script.js"></script>
</body>
</html>
